name: Deploy to Render

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements.txt

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              -X POST \
              -H "Content-Type: application/json"
            echo "Render deploy hook triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping automatic deploy trigger."
            echo "Set the secret in GitHub repository settings to enable automatic deploys."
          fi
