services:
  - type: web
    name: churn-predictor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: PYTHONUNBUFFERED
        value: "1"
